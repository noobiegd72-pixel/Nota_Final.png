<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nota_Final.png</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-dark: #121212;
            --text-main: #e0e0e0;
            --text-dim: #777777;
            --accent: #2979ff;
            --border: #222222;
            --error: #ff5252;
            --success: #00e676;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* Pantalla de Carga Estilo Terminal */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-content {
            text-align: center;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Contenedor del Canvas (Viewport) */
        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            overflow: hidden;
        }

        canvas {
            image-rendering: pixelated;
            background-color: #ffffff;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform-origin: 0 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Selector de Píxel Dinámico */
        #pixel-selector {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            display: none;
            border: 1px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,1);
            mix-blend-mode: difference;
        }

        /* Interfaz Superior */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 25px;
            z-index: 1000;
            justify-content: space-between;
        }

        .brand h1 {
            font-size: 1rem;
            letter-spacing: 1px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .global-stats {
            display: flex;
            gap: 25px;
            font-size: 0.75rem;
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-dim);
        }

        .global-stats b { color: var(--accent); }

        #mobile-menu-btn {
            display: none;
            background: var(--panel-dark);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        #mobile-menu-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Interfaz Inferior: Paleta y Cooldown */
        #ui-bottom {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
        }

        .palette-container {
            background: var(--panel-dark);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }

        .color-box {
            aspect-ratio: 1;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.1s;
        }

        .color-box:hover { transform: translateY(-2px); }
        .color-box.active { 
            border: 2px solid white; 
            transform: scale(1.15); 
            z-index: 2;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .cooldown-wrapper {
            width: 100%;
            height: 4px;
            background: #000;
            border-radius: 2px;
            overflow: hidden;
        }

        #cooldown-timer {
            height: 100%;
            width: 100%;
            background: var(--accent);
            transition: width 0.1s linear;
        }

        /* Paneles Laterales */
        #sidebar-right {
            position: fixed;
            right: 20px;
            top: 80px;
            bottom: 150px;
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 900;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-module {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .chat-module {
            flex: 1;
            min-height: 200px;
        }

        .module-header {
            padding: 10px 15px;
            font-size: 0.65rem;
            font-weight: bold;
            color: var(--text-dim);
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-close-btn {
            display: none;
            background: none;
            border: none;
            color: var(--error);
            font-size: 1rem;
            cursor: pointer;
            padding: 0 5px;
        }

        #chat-area {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            touch-action: pan-y; /* Permite scroll táctil */
        }

        .msg { line-height: 1.4; border-left: 2px solid var(--accent); padding-left: 8px; word-wrap: break-word; }
        .msg b { color: var(--accent); font-size: 0.7rem; margin-right: 5px; }

        #chat-input {
            background: transparent;
            border: none;
            border-top: 1px solid var(--border);
            padding: 12px;
            color: white;
            outline: none;
            font-size: 0.8rem;
        }

        .stats-module {
            padding: 15px;
            font-size: 0.75rem;
            line-height: 1.8;
        }

        .stats-module div {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #333;
        }

        .stats-module span { color: var(--text-dim); }

        /* Botón Admin y Modales */
        #admin-entry {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 45px;
            height: 45px;
            background: var(--panel-dark);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1001;
            opacity: 0.3;
            transition: 0.3s;
        }

        #admin-entry:hover { opacity: 1; border-color: var(--accent); }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--panel-dark);
            padding: 35px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .modal-content h2 { font-size: 1.2rem; margin-bottom: 25px; color: var(--accent); }

        input[type="password"], input[type="number"], input[type="text"] {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn-stack { display: flex; flex-direction: column; gap: 10px; }

        .action-btn {
            padding: 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .btn-main { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-danger { background: #b71c1c; color: white; }

        #coords-info {
            position: fixed;
            pointer-events: none;
            background: rgba(0,0,0,0.8);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
            z-index: 1500;
            display: none;
            border: 1px solid var(--border);
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            header { padding: 0 15px; }
            .brand h1 { font-size: 0.9rem; }
            #mobile-menu-btn { display: block; }
            
            /* Compactar estadísticas del header */
            .global-stats { gap: 10px; font-size: 0.65rem; }
            #session-clock { display: none; } /* Ocultar reloj en móvil para ahorrar espacio */
            
            /* Convertir panel lateral en un menú desplegable (Drawer) */
            #sidebar-right {
                top: 60px;
                bottom: 0;
                right: -320px; /* Oculto por defecto */
                width: 300px;
                max-width: 100vw;
                height: calc(100vh - 60px);
                background: rgba(12, 12, 12, 0.98);
                backdrop-filter: blur(20px);
                border-left: 1px solid var(--border);
                padding: 15px;
                z-index: 2000;
            }

            #sidebar-right.show { right: 0; }
            
            .mobile-close-btn { display: block; }
            
            .glass-module { background: transparent; border: none; }
            .module-header { background: transparent; padding: 10px 5px; }
            
            /* Ajustes de paleta */
            #ui-bottom { bottom: 15px; padding: 0 10px; }
            .palette-grid { grid-template-columns: repeat(8, 1fr); gap: 4px; }
            
            #admin-entry { bottom: 85px; right: 15px; width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <p style="font-family: monospace; font-size: 0.7rem; letter-spacing: 2px;">SINCRONIZANDO LIENZO</p>
        </div>
    </div>

    <div id="coords-info">X:0 Y:0</div>

    <header>
        <div class="brand"><h1>Nota_Final.png</h1></div>
        <div class="header-controls">
            <div class="global-stats">
                <span>👥 <b id="stat-online">0</b></span>
                <span>📍 <b id="stat-total">0</b></span>
                <span id="session-clock">00:00:00</span>
            </div>
            <button id="mobile-menu-btn">💬 Menú</button>
        </div>
    </header>

    <div id="viewport">
        <div id="pixel-selector"></div>
        <canvas id="canvas" width="125" height="125"></canvas>
    </div>

    <div id="sidebar-right">
        <div class="glass-module chat-module">
            <div class="module-header">
                Mensajes Recientes
                <button class="mobile-close-btn" onclick="toggleMobileMenu()">✖</button>
            </div>
            <div id="chat-area"></div>
            <input type="text" id="chat-input" placeholder="Enviar mensaje..." maxlength="50">
        </div>
        <div class="glass-module">
            <div class="module-header">Datos de Sesión</div>
            <div class="stats-module">
                <div><span>Tus aportes:</span> <b id="stat-mine">0</b></div>
                <div><span>Resolución:</span> <b>125x125 px</b></div>
                <div><span>Cooldown:</span> <b>1.0s</b></div>
                <div><span>Estado:</span> <b style="color:var(--success)">Conectado</b></div>
            </div>
        </div>
    </div>

    <div id="ui-bottom">
        <div class="palette-container">
            <div class="palette-grid" id="palette-render"></div>
            <div class="cooldown-wrapper">
                <div id="cooldown-timer"></div>
            </div>
        </div>
    </div>

    <div id="admin-entry">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V17M12 7V13M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z"/></svg>
    </div>

    <div id="modal-login" class="modal-overlay">
        <div class="modal-content">
            <h2>Autenticación</h2>
            <input type="password" id="admin-key" placeholder="Introducir Contraseña de Administración">
            <div class="btn-stack">
                <button class="action-btn btn-main" onclick="attemptLogin()">Verificar</button>
                <button class="action-btn btn-ghost" onclick="hideModals()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-dashboard" class="modal-overlay">
        <div class="modal-content">
            <h2>Panel de Control</h2>
            <button class="action-btn btn-danger" onclick="executeWipe()">Formatear Todo el Lienzo</button>
            <div style="margin: 20px 0; border-top: 1px solid var(--border); padding-top: 20px;">
                <p style="font-size: 0.7rem; margin-bottom: 10px; color: var(--text-dim);">Configurar Timelapse</p>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="tl-freq" value="5" style="margin:0" placeholder="Segs">
                    <button class="action-btn btn-main" id="tl-toggle" onclick="handleTimelapse()">Iniciar</button>
                </div>
                <div id="tl-status" style="font-size: 0.6rem; color: var(--accent); margin-top: 10px; font-family: monospace;"></div>
            </div>
            <button class="action-btn btn-ghost" onclick="hideModals()" style="width:100%">Cerrar</button>
        </div>
    </div>

    <script>
        /**
         * CONFIGURACIÓN CORE Y FIREBASE
         */
        const firebaseConfig = { 
            apiKey: "AIzaSyAtTbxuzHMQqSpQt9ZHZP1a0qZykY_NvWA", 
            authDomain: "notafinalpng.firebaseapp.com", 
            projectId: "notafinalpng", 
            storageBucket: "notafinalpng.firebasestorage.app", 
            messagingSenderId: "212333550718", 
            appId: "1:212333550718:web:05d1b04dc2a1de2a88cc2f" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const viewport = document.getElementById('viewport');
        const selector = document.getElementById('pixel-selector');
        const RES = 125;

        // Variables de Estado de Cámara
        let scale = 4.0;
        let originX = (window.innerWidth / 2) - (RES * scale / 2);
        let originY = (window.innerHeight / 2) - (RES * scale / 2);
        
        // Flags de Interacción
        let isMoving = false;
        let wasDragged = false;
        let lastX, lastY;
        let pinchDist = null;
        
        // Variables de Juego
        let paintReady = true;
        let activeColor = "#000000";
        let isAuthorized = false;
        let myPixels = 0;

        const colorPalette = [
            "#000000", "#ffffff", "#aaaaaa", "#555555", "#fed3cf", "#f14131", "#ffa300", "#ffec00", 
            "#00e436", "#00811f", "#00beff", "#0000ea", "#827193", "#e305ff", "#ff8bce", "#803c15",
            "#222222", "#d4d7d9", "#9c0000", "#ff4500", "#ffa800", "#ffd635", "#00a368", "#7eed56",
            "#2450a4", "#3690ea", "#51e9f4", "#811e9f", "#b44ac0", "#ff3881", "#9c6926", "#6d482f"
        ];

        /**
         * LÓGICA UI MÓVIL
         */
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar-right');

        mobileBtn.addEventListener('click', toggleMobileMenu);

        function toggleMobileMenu() {
            sidebar.classList.toggle('show');
            mobileBtn.classList.toggle('active');
        }

        // Evitar que interactuar con el menú dibuje o mueva la cámara
        sidebar.addEventListener('touchstart', e => e.stopPropagation(), {passive: false});
        sidebar.addEventListener('touchmove', e => e.stopPropagation(), {passive: false});
        sidebar.addEventListener('mousedown', e => e.stopPropagation());
        sidebar.addEventListener('mousemove', e => e.stopPropagation());
        sidebar.addEventListener('wheel', e => e.stopPropagation(), {passive: false});


        /**
         * INICIALIZACIÓN DE SISTEMA
         */
        function boot() {
            // Renderizar Paleta
            const container = document.getElementById('palette-render');
            colorPalette.forEach(c => {
                const box = document.createElement('div');
                box.className = 'color-box';
                box.style.backgroundColor = c;
                if(c === activeColor) box.classList.add('active');
                
                box.onclick = () => {
                    document.querySelectorAll('.color-box').forEach(b => b.classList.remove('active'));
                    box.classList.add('active');
                    activeColor = c;
                };
                container.appendChild(box);
            });

            // Sincronización de Datos Inicial
            db.ref('board').once('value', snapshot => {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, RES, RES);
                const data = snapshot.val();
                if(data) {
                    for(let key in data) {
                        const [x, y] = key.split('_');
                        ctx.fillStyle = data[key];
                        ctx.fillRect(parseInt(x), parseInt(y), 1, 1);
                    }
                }
                updateCounters();
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
            });

            // Listeners Realtime
            db.ref('board').on('child_added', updatePixel);
            db.ref('board').on('child_changed', updatePixel);
            db.ref('board').on('child_removed', () => {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0,0, RES, RES);
                updateCounters();
            });

            // Gestión de Presencia
            const presenceRef = db.ref('presence').push(true);
            presenceRef.onDisconnect().remove();
            db.ref('presence').on('value', s => {
                // Formato con comas para usuarios también
                document.getElementById('stat-online').innerText = (s.numChildren() || 0).toLocaleString('en-US');
            });

            // Reloj de Sesión
            const start = Date.now();
            setInterval(() => {
                const s = Math.floor((Date.now() - start) / 1000);
                const h = String(Math.floor(s / 3600)).padStart(2, '0');
                const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
                const sec = String(s % 60).padStart(2, '0');
                document.getElementById('session-clock').innerText = `${h}:${m}:${sec}`;
            }, 1000);

            refreshCamera();
        }

        function updatePixel(s) {
            const [x, y] = s.key.split('_');
            ctx.fillStyle = s.val();
            ctx.fillRect(parseInt(x), parseInt(y), 1, 1);
            updateCounters();
        }

        function updateCounters() {
            db.ref('board').once('value', s => {
                // Aplica formato de separador de miles con comas (en-US)
                const total = s.numChildren() || 0;
                document.getElementById('stat-total').innerText = total.toLocaleString('en-US');
            });
        }

        /**
         * LÓGICA DE CÁMARA (ZOOM Y PANNING)
         */
        function refreshCamera() {
            canvas.style.transform = `translate(${originX}px, ${originY}px) scale(${scale})`;
        }

        // Mouse Wheel Zoom
        window.addEventListener('wheel', e => {
            if(sidebar.contains(e.target)) return; // Ignorar zoom si el cursor está en el menú
            e.preventDefault();
            const factor = e.deltaY > 0 ? 0.85 : 1.15;
            applyZoom(factor, e.clientX, e.clientY);
        }, { passive: false });

        function applyZoom(factor, centerX, centerY) {
            const oldScale = scale;
            scale = Math.min(Math.max(scale * factor, 0.4), 80);
            
            if (scale !== oldScale) {
                originX -= (centerX - originX) * (scale / oldScale - 1);
                originY -= (centerY - originY) * (scale / oldScale - 1);
                refreshCamera();
            }
        }

        // Interacciones Mouse
        viewport.addEventListener('mousedown', e => {
            isMoving = true;
            wasDragged = false;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        window.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const px = Math.floor((e.clientX - rect.left) / scale);
            const py = Math.floor((e.clientY - rect.top) / scale);

            if (isMoving) {
                const dist = Math.hypot(e.clientX - lastX, e.clientY - lastY);
                if(dist > 3) wasDragged = true;

                originX += e.clientX - lastX;
                originY += e.clientY - lastY;
                lastX = e.clientX;
                lastY = e.clientY;
                refreshCamera();
            }

            // UI de Selección y Coordenadas
            if(px >= 0 && px < RES && py >= 0 && py < RES) {
                selector.style.display = 'block';
                selector.style.left = (rect.left + px * scale) + 'px';
                selector.style.top = (rect.top + py * scale) + 'px';
                selector.style.width = scale + 'px';
                selector.style.height = scale + 'px';
                
                const cInfo = document.getElementById('coords-info');
                cInfo.style.display = 'block';
                cInfo.style.left = (e.clientX + 15) + 'px';
                cInfo.style.top = (e.clientY + 15) + 'px';
                cInfo.innerText = `X:${px} Y:${py}`;
            } else {
                selector.style.display = 'none';
                document.getElementById('coords-info').style.display = 'none';
            }
        });

        window.addEventListener('mouseup', e => {
            if (!wasDragged && isMoving) {
                commitPixel(e);
            }
            isMoving = false;
        });

        /**
         * SOPORTE TÁCTIL AVANZADO (MOBILE)
         */
        viewport.addEventListener('touchstart', e => {
            if(e.touches.length === 2) {
                pinchDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX, 
                    e.touches[0].pageY - e.touches[1].pageY
                );
            } else if(e.touches.length === 1) {
                isMoving = true;
                wasDragged = false;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', e => {
            e.preventDefault();
            if(e.touches.length === 2 && pinchDist) {
                const currentDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX, 
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const factor = currentDist / pinchDist;
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                
                applyZoom(factor, midX, midY);
                pinchDist = currentDist;
            } else if(isMoving && e.touches.length === 1) {
                wasDragged = true;
                originX += e.touches[0].clientX - lastX;
                originY += e.touches[0].clientY - lastY;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                refreshCamera();
            }
        }, { passive: false });

        viewport.addEventListener('touchend', e => {
            if (!wasDragged && isMoving && e.touches.length === 0) {
                const touch = e.changedTouches[0];
                commitPixel(touch);
            }
            isMoving = false;
            pinchDist = null;
        });

        /**
         * MECÁNICA DE PINTADO
         */
        function commitPixel(input) {
            if(!paintReady) return;

            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((input.clientX - rect.left) / scale);
            const y = Math.floor((input.clientY - rect.top) / scale);

            if(x >= 0 && x < RES && y >= 0 && y < RES) {
                db.ref(`board/${x}_${y}`).set(activeColor);
                myPixels++;
                // Formato con comas para los píxeles propios
                document.getElementById('stat-mine').innerText = myPixels.toLocaleString('en-US');
                triggerCooldown();
            }
        }

        function triggerCooldown() {
            paintReady = false;
            let start = Date.now();
            const time = 1000; // 1 segundo
            const bar = document.getElementById('cooldown-timer');
            
            const frame = () => {
                const now = Date.now();
                const diff = now - start;
                const p = (diff / time) * 100;
                bar.style.width = (100 - p) + "%";

                if(diff < time) {
                    requestAnimationFrame(frame);
                } else {
                    paintReady = true;
                    bar.style.width = "100%";
                }
            };
            requestAnimationFrame(frame);
        }

        /**
         * SISTEMA DE CHAT
         */
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keydown', e => {
            if(e.key === 'Enter' && chatInput.value.trim() !== "") {
                db.ref('messages').push({
                    content: chatInput.value.substring(0, 50),
                    time: Date.now()
                });
                chatInput.value = "";
            }
        });

        db.ref('messages').limitToLast(15).on('child_added', s => {
            const m = s.val();
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>USR_${s.key.substring(1,4)}:</b> ${m.content}`;
            const box = document.getElementById('chat-area');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        /**
         * ADMINISTRACIÓN Y TIMELAPSE
         */
        document.getElementById('admin-entry').onclick = () => {
            if(!isAuthorized) document.getElementById('modal-login').style.display = 'flex';
            else document.getElementById('modal-dashboard').style.display = 'flex';
        };

        function hideModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        }

        function attemptLogin() {
            const p = document.getElementById('admin-key').value;
            if(p === "Isaias2013Cerrado") {
                isAuthorized = true;
                hideModals();
                document.getElementById('modal-dashboard').style.display = 'flex';
                document.getElementById('admin-entry').style.opacity = '1';
                document.getElementById('admin-entry').style.color = 'var(--accent)';
            } else {
                alert("Acceso Denegado.");
            }
        }

        function executeWipe() {
            if(confirm("¿ELIMINAR TODO EL LIENZO? Esta acción no se puede deshacer.")) {
                db.ref('board').remove();
                hideModals();
            }
        }

        // Timelapse Engine
        let isCapturing = false;
        let frames = [];
        let captureHandle = null;

        function handleTimelapse() {
            if(!isCapturing) {
                isCapturing = true;
                frames = [];
                const interval = parseInt(document.getElementById('tl-freq').value) * 1000;
                document.getElementById('tl-toggle').innerText = "DETENER";
                document.getElementById('tl-toggle').classList.replace('btn-main', 'btn-danger');
                
                captureHandle = setInterval(() => {
                    const snap = document.createElement('canvas');
                    snap.width = RES; snap.height = RES;
                    const sctx = snap.getContext('2d');
                    sctx.drawImage(canvas, 0, 0);

                    // Estampa de Tiempo Completa
                    sctx.fillStyle = "rgba(0,0,0,0.7)";
                    sctx.fillRect(0, RES - 12, RES, 12);
                    sctx.fillStyle = "#ffffff";
                    sctx.font = "6px monospace";
                    const now = new Date();
                    const str = `${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
                    sctx.fillText(str, 2, RES - 4);

                    frames.push(snap.toDataURL('image/webp'));
                    document.getElementById('tl-status').innerText = `Capturas: ${frames.length}`;
                }, interval);
            } else {
                finalizeTimelapse();
            }
        }

        async function finalizeTimelapse() {
            clearInterval(captureHandle);
            isCapturing = false;
            document.getElementById('tl-toggle').innerText = "PROCESANDO...";
            
            const videoCanvas = document.createElement('canvas');
            videoCanvas.width = RES; videoCanvas.height = RES;
            const vctx = videoCanvas.getContext('2d');
            
            const stream = videoCanvas.captureStream(12);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const blobs = [];
            
            recorder.ondataavailable = e => blobs.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(blobs, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `timelapse_res_${Date.now()}.webm`;
                link.click();
                
                document.getElementById('tl-toggle').innerText = "INICIAR";
                document.getElementById('tl-toggle').classList.replace('btn-danger', 'btn-main');
                document.getElementById('tl-status').innerText = "Exportación lista.";
            };

            recorder.start();
            for(let f of frames) {
                await new Promise(r => {
                    const img = new Image();
                    img.onload = () => {
                        vctx.clearRect(0,0,RES,RES);
                        vctx.drawImage(img, 0, 0);
                        setTimeout(r, 80); // Velocidad de reproducción
                    };
                    img.src = f;
                });
            }
            recorder.stop();
        }

        // Ejecutar Boot
        boot();
    </script>
</body>
</html>
