<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Nota_Final.png | Motor de Lienzo Global</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* ========================================================================
        1. DEFINICIÓN DE VARIABLES Y TEMAS (CSS VARIABLES)
        ========================================================================
        */
        :root {
            /* Paleta Primaria: Interfaz Dark */
            --hex-bg-base: #050505;
            --hex-bg-panel: #111112;
            --hex-bg-panel-light: #1a1a1c;
            --hex-border: #28282b;
            --hex-border-active: #3f3f44;
            
            /* Colores de Acento y Estado */
            --hex-accent: #3d5afe;
            --hex-accent-glow: rgba(61, 90, 254, 0.4);
            --hex-text-main: #f0f0f5;
            --hex-text-muted: #80808a;
            --hex-success: #00e676;
            --hex-error: #ff5252;
            --hex-warning: #ffd740;

            /* Configuración de Layout */
            --header-h: 64px;
            --sidebar-w: 320px;
            --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
            --radius-md: 10px;
            --radius-lg: 16px;
        }

        /* ========================================================================
        2. RESET Y ESTILOS BASE
        ========================================================================
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* Prevenir selección accidental en UI */
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--hex-bg-base);
            color: var(--hex-text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Crucial para el sistema de Pan/Zoom */
            touch-action: none; /* Desactiva gestos nativos del navegador */
            position: fixed; /* Evita pull-to-refresh en móviles */
        }

        /* ========================================================================
        3. SISTEMA DE CARGA (LOADER) - ARREGLO DE "INICIANDO PROTOCOLOS"
        ========================================================================
        */
        #app-loader {
            position: fixed;
            inset: 0;
            background: var(--hex-bg-base);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s var(--ease-standard), visibility 0.8s;
        }

        #app-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 3px solid var(--hex-bg-panel);
            border-top: 3px solid var(--hex-accent);
            border-radius: 50%;
            animation: rotate-loader 1s infinite linear;
            margin-bottom: 30px;
            box-shadow: 0 0 20px var(--hex-accent-glow);
        }

        @keyframes rotate-loader {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loader-log {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--hex-text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        .loader-log span {
            display: block;
            margin-top: 8px;
            color: var(--hex-accent);
            animation: pulse-text 1.5s infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ========================================================================
        4. VIEWPORT Y CANVAS (EL LIENZO)
        ========================================================================
        */
        #viewport-container {
            width: 100vw;
            height: 100vh;
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas#main-canvas {
            background-color: #ffffff;
            image-rendering: pixelated; /* Evita blur al escalar */
            image-rendering: crisp-edges;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            transform-origin: 0 0; /* Punto crítico para el motor de zoom */
            cursor: crosshair;
            border: 1px solid #000;
        }

        /* SISTEMA DE SELECCIÓN PÍXEL-PERFECTO (SNAPPING) */
        #pixel-snapper {
            position: absolute;
            pointer-events: none; /* No interfiere con clicks */
            z-index: 100;
            display: none;
            box-sizing: border-box;
            border: 1px solid #ffffff;
            outline: 1px solid #000000;
            mix-blend-mode: difference;
        }

        #pixel-coords-overlay {
            position: fixed;
            pointer-events: none;
            z-index: 101;
            background: rgba(0,0,0,0.85);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            color: #fff;
            border: 1px solid var(--hex-border);
            display: none;
        }

        /* ========================================================================
        5. INTERFAZ SUPERIOR (NAVBAR)
        ========================================================================
        */
        #ui-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--hex-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area h1 {
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--hex-text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 0.7rem;
            color: var(--hex-text-muted);
            font-weight: 600;
        }

        .stat-group b {
            color: var(--hex-text-main);
            font-family: monospace;
            font-size: 0.8rem;
        }

        /* ========================================================================
        6. BARRA LATERAL (SIDEBAR) - CHAT Y PERFIL
        ========================================================================
        */
        #ui-sidebar {
            position: fixed;
            right: 20px;
            top: calc(var(--header-h) + 20px);
            bottom: 150px;
            width: var(--sidebar-w);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 900;
            transition: transform 0.4s var(--ease-standard);
        }

        .panel-container {
            background: rgba(17, 17, 18, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--hex-border);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .panel-header {
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--hex-border);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            color: var(--hex-text-muted);
            display: flex;
            justify-content: space-between;
        }

        #chat-window {
            flex: 1;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--hex-border) transparent;
        }

        .chat-msg {
            font-size: 0.8rem;
            line-height: 1.4;
            word-break: break-word;
            animation: msg-slide 0.3s var(--ease-standard);
        }

        @keyframes msg-slide {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .chat-msg .author {
            color: var(--hex-accent);
            font-weight: 700;
            margin-right: 5px;
        }

        .chat-msg.system {
            color: var(--hex-warning);
            font-style: italic;
            font-size: 0.75rem;
        }

        #chat-input-area {
            padding: 10px;
            background: #000;
            border-top: 1px solid var(--hex-border);
        }

        #chat-field {
            width: 100%;
            background: transparent;
            border: 1px solid var(--hex-border);
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-size: 0.8rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #chat-field:focus {
            border-color: var(--hex-accent);
        }

        /* ========================================================================
        7. CONTROLES INFERIORES (PALETA Y COOLDOWN)
        ========================================================================
        */
        #ui-bottom-dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 650px;
            z-index: 1000;
        }

        .palette-card {
            background: var(--hex-bg-panel);
            border: 1px solid var(--hex-border);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }

        .color-swatch {
            aspect-ratio: 1;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s var(--ease-standard);
            position: relative;
        }

        .color-swatch:hover {
            transform: translateY(-3px) scale(1.1);
        }

        .color-swatch.active {
            border-color: #fff;
            transform: scale(1.15);
            z-index: 2;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        .cooldown-wrapper {
            width: 100%;
            height: 6px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--hex-border);
        }

        #cooldown-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, var(--hex-accent), #00d2ff);
            transition: width 0.1s linear;
        }

        /* ========================================================================
        8. MODALES Y DIÁLOGOS
        ========================================================================
        */
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-box {
            background: var(--hex-bg-panel);
            border: 1px solid var(--hex-border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            animation: modal-enter 0.5s var(--ease-standard);
        }

        @keyframes modal-enter {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-box h2 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .modal-box p {
            color: var(--hex-text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--hex-accent);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .text-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--hex-border);
            padding: 14px 18px;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .text-input:focus {
            border-color: var(--hex-accent);
            box-shadow: 0 0 0 4px var(--hex-accent-glow);
        }

        .btn-primary {
            width: 100%;
            background: var(--hex-accent);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            background: #536dfe;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--hex-accent-glow);
        }

        /* ========================================================================
        9. ESTILOS MÓVILES (RESPONSIVE)
        ========================================================================
        */
        @media (max-width: 800px) {
            :root {
                --sidebar-w: 100%;
            }

            #ui-sidebar {
                position: fixed;
                right: -100%;
                top: var(--header-h);
                bottom: 0;
                margin: 0;
                width: 100%;
                background: var(--hex-bg-base);
                z-index: 2000;
                padding: 15px;
                transition: right 0.4s var(--ease-standard);
            }

            #ui-sidebar.active {
                right: 0;
            }

            #ui-bottom-dock {
                width: calc(100% - 20px);
                bottom: 15px;
            }

            .palette-grid {
                grid-template-columns: repeat(8, 1fr);
            }

            .stat-group.hide-mobile {
                display: none;
            }

            #mobile-menu-trigger {
                display: block !important;
            }
        }

        #mobile-menu-trigger {
            display: none;
            background: var(--hex-bg-panel-light);
            border: 1px solid var(--hex-border);
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        /* ========================================================================
        10. UTILIDADES DE ANIMACIÓN
        ========================================================================
        */
        .pulse-red { animation: pulse-error 2s infinite; }
        @keyframes pulse-error {
            0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }
    </style>
</head>
<body>

    <div id="app-loader">
        <div class="loader-ring"></div>
        <div class="loader-log">
            Estableciendo Conexión
            <span id="loader-status">Iniciando Protocolos...</span>
        </div>
    </div>

    <div id="modal-id" class="modal-mask" style="display: flex;">
        <div class="modal-box">
            <h2>Bienvenido</h2>
            <p>Introduce un nombre de usuario para identificarte en el lienzo y el chat global.</p>
            <div class="input-group">
                <label>Nombre de Usuario</label>
                <input type="text" id="username-field" class="text-input" placeholder="Ej: PixelArt_Fan" maxlength="15">
            </div>
            <button class="btn-primary" id="btn-enter">Empezar a Dibujar</button>
        </div>
    </div>

    <div id="pixel-coords-overlay">X:0 Y:0</div>

    <header id="ui-header">
        <div class="logo-area">
            <h1>Nota_Final.png</h1>
        </div>
        
        <div class="header-stats">
            <div class="stat-group hide-mobile">
                SISTEMA: <b id="stat-ping" style="color: var(--hex-success);">ONLINE</b>
            </div>
            <div class="stat-group">
                USUARIOS: <b id="stat-online">0</b>
            </div>
            <div class="stat-group">
                PÍXELES: <b id="stat-total">0</b>
            </div>
            <button id="mobile-menu-trigger">MENU</button>
        </div>
    </header>

    <main id="viewport-container">
        <div id="pixel-snapper"></div>
        <canvas id="main-canvas" width="125" height="125"></canvas>
    </main>

    <aside id="ui-sidebar">
        <div class="panel-container" style="flex: 1;">
            <div class="panel-header">
                Chat Global
                <span id="close-mobile-menu" style="cursor:pointer; display:none;">Cerrar</span>
            </div>
            <div id="chat-window">
                </div>
            <div id="chat-input-area">
                <input type="text" id="chat-field" placeholder="Escribe un mensaje..." maxlength="60">
            </div>
        </div>

        <div class="panel-container">
            <div class="panel-header">Sesión Actual</div>
            <div style="padding: 15px; font-size: 0.75rem; color: var(--hex-text-muted); line-height: 1.8;">
                USUARIO: <b id="display-user" style="color:#fff">---</b><br>
                MIS PÍXELES: <b id="stat-my-pixels" style="color:#fff">0</b><br>
                COOLDOWN: <b style="color:#fff">3.0s</b>
            </div>
        </div>
    </aside>

    <div id="ui-bottom-dock">
        <div class="palette-card">
            <div class="palette-grid" id="palette-render">
                </div>
            <div class="cooldown-wrapper">
                <div id="cooldown-bar"></div>
            </div>
        </div>
    </div>

    <script>
        /**
         * OBJETO DE CONFIGURACIÓN GLOBAL
         * Centraliza todos los parámetros técnicos del sistema.
         */
        const NF_CONFIG = {
            FIREBASE: {
                apiKey: "AIzaSyAtTbxuzHMQqSpQt9ZHZP1a0qZykY_NvWA",
                authDomain: "notafinalpng.firebaseapp.com",
                projectId: "notafinalpng",
                storageBucket: "notafinalpng.firebasestorage.app",
                messagingSenderId: "212333550718",
                appId: "1:212333550718:web:05d1b04dc2a1de2a88cc2f"
            },
            CANVAS: {
                RESOLUTION: 125,
                COOLDOWN_TIME: 3000,
                DEFAULT_SCALE: 5.0,
                MIN_SCALE: 0.5,
                MAX_SCALE: 80.0
            },
            PALETTE: [
                "#000000", "#ffffff", "#aaaaaa", "#555555", "#fed3cf", "#f14131", "#ffa300", "#ffec00", 
                "#00e436", "#00811f", "#00beff", "#0000ea", "#827193", "#e305ff", "#ff8bce", "#803c15",
                "#222222", "#d4d7d9", "#9c0000", "#ff4500", "#ffa800", "#ffd635", "#00a368", "#7eed56",
                "#2450a4", "#3690ea", "#51e9f4", "#811e9f", "#b44ac0", "#ff3881", "#9c6926", "#6d482f"
            ]
        };

        /**
         * ESTADO DE LA APLICACIÓN (STATE MANAGEMENT)
         * Mantiene el seguimiento reactivo de la sesión.
         */
        const STATE = {
            user: {
                name: "Invitado",
                pixelsPlaced: 0,
                isAuth: false
            },
            engine: {
                scale: NF_CONFIG.CANVAS.DEFAULT_SCALE,
                posX: 0,
                posY: 0,
                isLoaded: false,
                isPaintingReady: true,
                selectedColor: "#000000"
            },
            input: {
                isDragging: false,
                lastMouseX: 0,
                lastMouseY: 0,
                dragThreshold: false
            }
        };

        // Inicialización de Firebase API
        firebase.initializeApp(NF_CONFIG.FIREBASE);
        const db = firebase.database();

        /**
         * REFERENCIAS DEL DOM (NODOS CACHEADOS)
         */
        const DOM = {
            canvas: document.getElementById('main-canvas'),
            ctx: document.getElementById('main-canvas').getContext('2d', { alpha: false }),
            viewport: document.getElementById('viewport-container'),
            loader: document.getElementById('app-loader'),
            loaderStatus: document.getElementById('loader-status'),
            modalId: document.getElementById('modal-id'),
            usernameField: document.getElementById('username-field'),
            snapper: document.getElementById('pixel-snapper'),
            coords: document.getElementById('pixel-coords-overlay'),
            chatWindow: document.getElementById('chat-window'),
            chatField: document.getElementById('chat-field'),
            cooldownBar: document.getElementById('cooldown-bar')
        };

        /**
         * FUNCIÓN DE ARRANQUE (BOOTSTRAP)
         * Se encarga de coordinar la carga de datos y la eliminación del loader.
         */
        async function boot() {
            try {
                updateLoader("Conectando con base de datos...");
                
                // 1. Cargar Identidad del LocalStorage
                const savedUser = localStorage.getItem('nf_username');
                if (savedUser) {
                    STATE.user.name = savedUser;
                    STATE.user.isAuth = true;
                    DOM.modalId.style.display = 'none';
                    document.getElementById('display-user').innerText = savedUser;
                }

                // 2. Sincronización Inicial de Píxeles
                // Añadimos un timeout de seguridad para que el loader no se bloquee infinitamente
                const boardPromise = db.ref('board').once('value');
                const timeoutPromise = new Promise(resolve => setTimeout(resolve, 5000));

                updateLoader("Sincronizando Lienzo...");
                const snapshot = await Promise.race([boardPromise, timeoutPromise]);
                
                if (snapshot && snapshot.val()) {
                    const data = snapshot.val();
                    renderFullBoard(data);
                } else {
                    // Si no hay datos, inicializar lienzo blanco
                    DOM.ctx.fillStyle = "#ffffff";
                    DOM.ctx.fillRect(0, 0, NF_CONFIG.CANVAS.RESOLUTION, NF_CONFIG.CANVAS.RESOLUTION);
                }

                // 3. Configurar Escucha de Tiempo Real
                setupRealtimeListeners();

                // 4. Centrar Vista Inicial
                centerViewport();

                // 5. Finalizar Carga
                updateLoader("Protocolos Listos.");
                setTimeout(() => {
                    DOM.loader.classList.add('hidden');
                    STATE.engine.isLoaded = true;
                }, 1000);

            } catch (error) {
                console.error("Error en el arranque:", error);
                DOM.loaderStatus.innerText = "Error Crítico: Reintentando...";
                setTimeout(() => location.reload(), 3000);
            }
        }

        /**
         * RENDERIZADO INICIAL DEL TABLERO
         */
        function renderFullBoard(data) {
            DOM.ctx.fillStyle = "#ffffff";
            DOM.ctx.fillRect(0, 0, NF_CONFIG.CANVAS.RESOLUTION, NF_CONFIG.CANVAS.RESOLUTION);
            
            Object.keys(data).forEach(key => {
                const [x, y] = key.split('_');
                DOM.ctx.fillStyle = data[key];
                DOM.ctx.fillRect(parseInt(x), parseInt(y), 1, 1);
            });
            updatePixelCounter();
        }

        /**
         * ACTUALIZADOR DE TEXTO DEL LOADER
         */
        function updateLoader(text) {
            DOM.loaderStatus.innerText = text;
        }

        /**
         * GESTIÓN DE CÁMARA (CENTER, ZOOM, PAN)
         */
        function centerViewport() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const res = NF_CONFIG.CANVAS.RESOLUTION;
            
            STATE.engine.posX = (vw / 2) - (res * STATE.engine.scale / 2);
            STATE.engine.posY = (vh / 2) - (res * STATE.engine.scale / 2);
            
            applyTransform();
        }

        function applyTransform() {
            DOM.canvas.style.transform = `translate(${STATE.engine.posX}px, ${STATE.engine.posY}px) scale(${STATE.engine.scale})`;
        }

        /**
         * LÓGICA DE SNAPPING (REDONDEO AL PÍXEL)
         * Convierte coordenadas de pantalla a coordenadas de lienzo.
         */
        function handlePixelSnapping(clientX, clientY) {
            if (!STATE.engine.isLoaded) return;

            const rect = DOM.canvas.getBoundingClientRect();
            
            // Calculamos la posición local dentro del canvas escalado
            const localX = (clientX - rect.left) / STATE.engine.scale;
            const localY = (clientY - rect.top) / STATE.engine.scale;

            // Redondeo absoluto al píxel más cercano (Snapping)
            const px = Math.floor(localX);
            const py = Math.floor(localY);

            // Validar límites
            if (px >= 0 && px < NF_CONFIG.CANVAS.RESOLUTION && py >= 0 && py < NF_CONFIG.CANVAS.RESOLUTION) {
                // Visualizar el Snapper
                DOM.snapper.style.display = 'block';
                DOM.snapper.style.width = STATE.engine.scale + "px";
                DOM.snapper.style.height = STATE.engine.scale + "px";
                
                // Posicionamiento alineado a la rejilla visual
                DOM.snapper.style.left = (rect.left + (px * STATE.engine.scale)) + "px";
                DOM.snapper.style.top = (rect.top + (py * STATE.engine.scale)) + "px";

                // Tooltip de coordenadas
                DOM.coords.style.display = 'block';
                DOM.coords.style.left = (clientX + 15) + "px";
                DOM.coords.style.top = (clientY + 15) + "px";
                DOM.coords.innerText = `[${px}, ${py}]`;
            } else {
                DOM.snapper.style.display = 'none';
                DOM.coords.style.display = 'none';
            }
        }

        /**
         * SISTEMA DE ENTRADA (RATÓN Y GESTOS TÁCTILES)
         */
        function attachInputHandlers() {
            
            // --- EVENTOS DE RATÓN ---
            window.addEventListener('wheel', (e) => {
                if (DOM.modalId.style.display !== 'none') return;
                e.preventDefault();

                const zoomSpeed = 0.1;
                const delta = e.deltaY > 0 ? (1 - zoomSpeed) : (1 + zoomSpeed);
                const prevScale = STATE.engine.scale;
                
                STATE.engine.scale = Math.min(Math.max(STATE.engine.scale * delta, NF_CONFIG.CANVAS.MIN_SCALE), NF_CONFIG.CANVAS.MAX_SCALE);
                
                // Zoom hacia el cursor
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                STATE.engine.posX -= (mouseX - STATE.engine.posX) * (STATE.engine.scale / prevScale - 1);
                STATE.engine.posY -= (mouseY - STATE.engine.posY) * (STATE.engine.scale / prevScale - 1);

                applyTransform();
                handlePixelSnapping(e.clientX, e.clientY);
            }, { passive: false });

            DOM.viewport.addEventListener('mousedown', (e) => {
                STATE.input.isDragging = true;
                STATE.input.dragThreshold = false;
                STATE.input.lastMouseX = e.clientX;
                STATE.input.lastMouseY = e.clientY;
            });

            window.addEventListener('mousemove', (e) => {
                if (STATE.input.isDragging) {
                    const dx = e.clientX - STATE.input.lastMouseX;
                    const dy = e.clientY - STATE.input.lastMouseY;
                    
                    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) STATE.input.dragThreshold = true;
                    
                    STATE.engine.posX += dx;
                    STATE.engine.posY += dy;
                    STATE.input.lastMouseX = e.clientX;
                    STATE.input.lastMouseY = e.clientY;
                    applyTransform();
                }
                handlePixelSnapping(e.clientX, e.clientY);
            });

            window.addEventListener('mouseup', (e) => {
                if (STATE.input.isDragging && !STATE.input.dragThreshold) {
                    commitPixel(e.clientX, e.clientY);
                }
                STATE.input.isDragging = false;
            });

            // --- EVENTOS TÁCTILES ---
            let touchStartDist = 0;

            DOM.viewport.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    STATE.input.isDragging = true;
                    STATE.input.dragThreshold = false;
                    STATE.input.lastMouseX = e.touches[0].clientX;
                    STATE.input.lastMouseY = e.touches[0].clientY;
                    handlePixelSnapping(e.touches[0].clientX, e.touches[0].clientY);
                } else if (e.touches.length === 2) {
                    touchStartDist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                }
            }, { passive: false });

            DOM.viewport.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 1 && STATE.input.isDragging) {
                    const dx = e.touches[0].clientX - STATE.input.lastMouseX;
                    const dy = e.touches[0].clientY - STATE.input.lastMouseY;
                    
                    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) STATE.input.dragThreshold = true;
                    
                    STATE.engine.posX += dx;
                    STATE.engine.posY += dy;
                    STATE.input.lastMouseX = e.touches[0].clientX;
                    STATE.input.lastMouseY = e.touches[0].clientY;
                    applyTransform();
                    handlePixelSnapping(e.touches[0].clientX, e.touches[0].clientY);
                } else if (e.touches.length === 2) {
                    // Lógica de Pinch Zoom
                    const dist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    const delta = dist / touchStartDist;
                    const prevScale = STATE.engine.scale;
                    
                    STATE.engine.scale = Math.min(Math.max(STATE.engine.scale * delta, NF_CONFIG.CANVAS.MIN_SCALE), NF_CONFIG.CANVAS.MAX_SCALE);
                    
                    const centerX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
                    const centerY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
                    
                    STATE.engine.posX -= (centerX - STATE.engine.posX) * (STATE.engine.scale / prevScale - 1);
                    STATE.engine.posY -= (centerY - STATE.engine.posY) * (STATE.engine.scale / prevScale - 1);
                    
                    touchStartDist = dist;
                    applyTransform();
                }
            }, { passive: false });

            DOM.viewport.addEventListener('touchend', (e) => {
                if (STATE.input.isDragging && !STATE.input.dragThreshold) {
                    commitPixel(STATE.input.lastMouseX, STATE.input.lastMouseY);
                }
                STATE.input.isDragging = false;
            });
        }

        /**
         * ACCIÓN DE PINTAR (COMMIT)
         */
        function commitPixel(screenX, screenY) {
            if (!STATE.engine.isPaintingReady) return;
            if (!STATE.user.isAuth) {
                DOM.modalId.style.display = 'flex';
                return;
            }

            const rect = DOM.canvas.getBoundingClientRect();
            const px = Math.floor((screenX - rect.left) / STATE.engine.scale);
            const py = Math.floor((screenY - rect.top) / STATE.engine.scale);

            if (px >= 0 && px < NF_CONFIG.CANVAS.RESOLUTION && py >= 0 && py < NF_CONFIG.CANVAS.RESOLUTION) {
                // Escribir en la DB
                db.ref(`board/${px}_${py}`).set(STATE.engine.selectedColor);
                
                // Local stats
                STATE.user.pixelsPlaced++;
                document.getElementById('stat-my-pixels').innerText = STATE.user.pixelsPlaced;
                
                // Iniciar Cooldown
                startCooldown();
            }
        }

        function startCooldown() {
            STATE.engine.isPaintingReady = false;
            const startTime = Date.now();
            const duration = NF_CONFIG.CANVAS.COOLDOWN_TIME;
            
            const timer = setInterval(() => {
                const now = Date.now();
                const remaining = Math.max(0, duration - (now - startTime));
                const percent = (remaining / duration) * 100;
                
                DOM.cooldownBar.style.width = (100 - percent) + "%";
                
                if (remaining <= 0) {
                    clearInterval(timer);
                    STATE.engine.isPaintingReady = true;
                    DOM.cooldownBar.style.width = "100%";
                }
            }, 30);
        }

        /**
         * ESCUCHADORES DE FIREBASE (REALTIME)
         */
        function setupRealtimeListeners() {
            // Actualización de píxeles individuales
            db.ref('board').on('child_added', snap => updatePixelOnCanvas(snap));
            db.ref('board').on('child_changed', snap => updatePixelOnCanvas(snap));
            
            // Contador de píxeles totales
            db.ref('board').on('value', snap => {
                updatePixelCounter(snap.numChildren());
            });

            // Chat
            db.ref('chat').limitToLast(40).on('child_added', snap => {
                appendChatMessage(snap.val());
            });

            // Presencia
            const presenceRef = db.ref('presence').push(true);
            presenceRef.onDisconnect().remove();
            db.ref('presence').on('value', snap => {
                document.getElementById('stat-online').innerText = snap.numChildren();
            });
        }

        function updatePixelOnCanvas(snap) {
            const [x, y] = snap.key.split('_');
            DOM.ctx.fillStyle = snap.val();
            DOM.ctx.fillRect(parseInt(x), parseInt(y), 1, 1);
        }

        function updatePixelCounter(count) {
            if (count === undefined) {
                db.ref('board').once('value', s => {
                    document.getElementById('stat-total').innerText = (s.numChildren() || 0).toLocaleString();
                });
            } else {
                document.getElementById('stat-total').innerText = count.toLocaleString();
            }
        }

        /**
         * SISTEMA DE CHAT
         */
        function appendChatMessage(data) {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            if (data.isSystem) div.classList.add('system');
            
            div.innerHTML = `<span class="author">${data.user}:</span> <span class="content">${data.text}</span>`;
            DOM.chatWindow.appendChild(div);
            DOM.chatWindow.scrollTop = DOM.chatWindow.scrollHeight;
        }

        function sendChat(text) {
            if (!text.trim()) return;
            db.ref('chat').push({
                user: STATE.user.name,
                text: text.substring(0, 60),
                timestamp: Date.now()
            });
        }

        /**
         * INTERFAZ Y PALETA
         */
        function setupUI() {
            // Generar Paleta
            const paletteGrid = document.getElementById('palette-render');
            NF_CONFIG.PALETTE.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                if (color === STATE.engine.selectedColor) swatch.classList.add('active');
                swatch.style.backgroundColor = color;
                
                swatch.onclick = () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    STATE.engine.selectedColor = color;
                };
                paletteGrid.appendChild(swatch);
            });

            // Eventos de Chat
            DOM.chatField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    sendChat(DOM.chatField.value);
                    DOM.chatField.value = "";
                }
            });

            // Modal Acceso
            document.getElementById('btn-enter').onclick = () => {
                const nick = DOM.usernameField.value.trim();
                if (nick.length >= 2) {
                    STATE.user.name = nick;
                    STATE.user.isAuth = true;
                    localStorage.setItem('nf_username', nick);
                    DOM.modalId.style.display = 'none';
                    document.getElementById('display-user').innerText = nick;
                    
                    // Notificar en chat
                    db.ref('chat').push({
                        user: "SISTEMA",
                        text: `${nick} ha entrado al lienzo.`,
                        isSystem: true
                    });
                } else {
                    DOM.usernameField.classList.add('pulse-red');
                    setTimeout(() => DOM.usernameField.classList.remove('pulse-red'), 1000);
                }
            };

            // Menú Móvil
            const menuTrigger = document.getElementById('mobile-menu-trigger');
            const sidebar = document.getElementById('ui-sidebar');
            menuTrigger.onclick = () => {
                sidebar.classList.toggle('active');
                menuTrigger.innerText = sidebar.classList.contains('active') ? "CERRAR" : "MENU";
            };

            // Evitar Zoom nativo en input
            const inputs = document.querySelectorAll('input');
            inputs.forEach(i => {
                i.addEventListener('focus', () => {
                    // Prevenir scroll en movil
                });
            });
        }

        /**
         * GESTIÓN DE RESIZE
         */
        window.addEventListener('resize', () => {
            // Al redimensionar la ventana, no perdemos el pan/zoom pero ajustamos si es necesario
            if (STATE.engine.isLoaded) {
                // Opcional: Recalcular centro si el canvas se pierde
            }
        });

        /**
         * INICIALIZACIÓN GLOBAL
         */
        document.addEventListener('DOMContentLoaded', () => {
            setupUI();
            attachInputHandlers();
            boot();
        });

        /**
         * LOGS TÉCNICOS DE PROTOCOLO
         */
        console.log("%c NOTA_FINAL.PNG %c Motor de Renderizado v4.0 Iniciado ", 
            "color: white; background: #3d5afe; font-weight: bold; padding: 4px;", 
            "color: #3d5afe; background: #000; padding: 4px;");

    </script>
</body>
